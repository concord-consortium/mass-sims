name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# OIDC: we need id-token write to assume the AWS deploy role.
permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "24"
  AWS_REGION: us-east-1
  S3_BUCKET: models-resources
  PROJECT_PREFIX: mass-sims

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build

      # ---------- Deploy ----------
      # Only deploy on push (not on PR). Branch pushes go to branch/<name>/; tag pushes go to version/<tag>/.
      #
      # NOTE: `${{ vars.AWS_DEPLOY_ROLE_ARN }}` is populated by `create-deploy-role.sh` from starter-projects.
      # The script either writes the literal ARN here (find-and-replace) or sets it as a GitHub Actions
      # repository variable named AWS_DEPLOY_ROLE_ARN. Adjust the line below if the script uses a different
      # pattern when you run it.

      - name: Configure AWS credentials (OIDC)
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine deploy path
        if: github.event_name == 'push'
        id: deploy_path
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "path=version/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "path=branch/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy starter to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync packages/starter/dist \
            "s3://${S3_BUCKET}/${PROJECT_PREFIX}/${{ steps.deploy_path.outputs.path }}/starter/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html with a short cache so updates propagate quickly
          aws s3 cp packages/starter/dist/index.html \
            "s3://${S3_BUCKET}/${PROJECT_PREFIX}/${{ steps.deploy_path.outputs.path }}/starter/index.html" \
            --cache-control "public,max-age=60,must-revalidate"

      - name: Print deploy URL
        if: github.event_name == 'push'
        run: |
          echo "Deployed to: https://${S3_BUCKET}.concord.org/${PROJECT_PREFIX}/${{ steps.deploy_path.outputs.path }}/starter/"
