name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: "24"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test
      - run: yarn test:scripts
      - run: yarn gen-index --check
      - run: yarn gen-workflows --check

  # End-to-end tests (Playwright). Runs after `checks`, in parallel with the deploy jobs. Builds
  # every sim, then runs the suite against the built artifacts via `vite preview` (the webServer
  # config never builds — see the build contract in docs/playwright.md). A failure here does NOT
  # block branch deploys.
  playwright:
    name: Run Playwright Tests
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      AWS_REGION: us-east-1
      S3_BUCKET: models-resources
      PROJECT_PREFIX: mass-sims
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: yarn test:playwright

      # Publish the HTML report to S3 so every run (pass or fail) has a persistent, linkable report.
      # Deploy path mirrors the sim deploys: branch/<name> on a branch, version/<tag> on a tag.
      - name: Determine report path
        if: ${{ !cancelled() }}
        id: report_path
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "path=version/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "path=branch/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ !cancelled() }}
        uses: aws-actions/configure-aws-credentials@v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Playwright report to S3
        if: ${{ !cancelled() }}
        env:
          REPORT_PATH: ${{ steps.report_path.outputs.path }}
        run: |
          aws s3 sync ./playwright/playwright-report \
            "s3://${S3_BUCKET}/${PROJECT_PREFIX}/playwright-report/${REPORT_PATH}" \
            --delete \
            --cache-control "no-cache, max-age=0"

      - name: Post report summary
        if: ${{ !cancelled() }}
        uses: daun/playwright-report-summary@v4
        with:
          report-file: playwright/test-results/results.json
          report-url: https://${{ env.S3_BUCKET }}.concord.org/${{ env.PROJECT_PREFIX }}/playwright-report/${{ steps.report_path.outputs.path }}/

  # Deploy split: per-sim sim-<name>.yml workflows handle incremental branch deploys (path-filtered
  # to the changed sim). The two jobs below cover what those can't — deploy_root always ships the
  # cross-cutting root index, and deploy_all_sims rebuilds EVERY sim on a release tag (see its note).
  deploy_root:
    name: Deploy root index.html
    needs: checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      S3_BUCKET: models-resources
      PROJECT_PREFIX: mass-sims
    steps:
      - uses: actions/checkout@v5

      - name: Determine deploy path
        id: deploy_path
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "path=version/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            echo "path=branch/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "path=version/release" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload root index.html
        env:
          DEPLOY_PATH: ${{ steps.deploy_path.outputs.path }}
        run: |
          aws s3 cp index.html \
            "s3://${S3_BUCKET}/${PROJECT_PREFIX}/${DEPLOY_PATH}/index.html" \
            --cache-control "no-cache"

  # Release builds: a version tag must produce a COMPLETE version/<tag>/ snapshot, so we rebuild
  # every sim here rather than leaning on per-sim path filters (which GitHub bypasses on tag pushes
  # anyway — an undocumented quirk we deliberately don't depend on). Runs only on tag pushes; branch
  # deploys stay incremental via the per-sim sim-<name>.yml workflows.
  deploy_all_sims:
    name: Deploy all sims (release)
    needs: checks
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      S3_BUCKET: models-resources
      PROJECT_PREFIX: mass-sims
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"
      - run: yarn install --frozen-lockfile

      - name: Build all sims
        env:
          MASS_SIMS_VERSION_PATH: version/${{ github.ref_name }}
        run: yarn build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy every sim to the versioned path
        env:
          DEPLOY_PATH: version/${{ github.ref_name }}
        run: |
          set -e
          shopt -s nullglob
          # packages/starter is a template and packages/sim-frame-preview is a dev tool — neither
          # lives under simulations/, so only real sims are deployed.
          for sim_dir in simulations/*/; do
            sim_name="$(basename "$sim_dir")"
            if [ ! -d "$sim_dir/dist" ]; then
              echo "::warning::No dist/ in $sim_dir, skipping."
              continue
            fi
            echo "Deploying $sim_name"
            aws s3 sync "$sim_dir/dist" \
              "s3://${S3_BUCKET}/${PROJECT_PREFIX}/${DEPLOY_PATH}/${sim_name}/" \
              --delete \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html" \
              --exclude "index-top.html"
            aws s3 cp "$sim_dir/dist/index.html" \
              "s3://${S3_BUCKET}/${PROJECT_PREFIX}/${DEPLOY_PATH}/${sim_name}/index.html" \
              --cache-control "no-cache"
            if [ -f "$sim_dir/dist/index-top.html" ]; then
              aws s3 cp "$sim_dir/dist/index-top.html" \
                "s3://${S3_BUCKET}/${PROJECT_PREFIX}/${DEPLOY_PATH}/${sim_name}/index-top.html" \
                --cache-control "no-cache"
            fi
          done
